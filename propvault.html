<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PropVault</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.12);--gold-b:rgba(201,168,76,0.32);--blue:#5badff;--purple:#b07aff;--bg:#0f0f1a;--bg2:#16162a;--bg3:#13131f;--brd:#2a2a45;--t:#fff;--t2:#888;--t3:#555;--green:#4ecb71;--orange:#ffaa44;--red:#e24b4a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}body{min-height:100%;background:var(--bg);color:var(--t);font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;overflow-x:hidden;overflow-y:auto}
#topbar{background:#17223b;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:102}
#topbar .logo{font-size:17px;font-weight:600;color:#fff;letter-spacing:-.3px}
#topbar .logo span{color:var(--gold)}
#topbar .mpill{margin-left:auto;font-size:11px;padding:3px 10px;background:rgba(91,173,255,.12);border:.5px solid rgba(91,173,255,.3);border-radius:20px;color:var(--blue)}
.modebar{display:flex;background:var(--bg3);border-bottom:.5px solid var(--brd);position:sticky;top:49px;z-index:101}
.mb{flex:1;padding:10px 4px;text-align:center;font-size:11px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;user-select:none}
.mb.on{color:var(--blue);border-bottom-color:var(--blue)}
#tabbar{display:flex;background:var(--bg3);border-bottom:.5px solid var(--brd);position:sticky;top:91px;z-index:100}
.tab{flex:1;padding:9px 4px 8px;text-align:center;font-size:10px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;user-select:none}
.tab svg{display:block;margin:0 auto 3px;width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.hero{background:#16213e;padding:18px 16px 16px}
.hero-tag{font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hero-h{font-size:20px;font-weight:600;color:#fff;margin-bottom:3px}
.hero-s{font-size:12px;color:var(--t3);margin-bottom:14px}
.hstats{display:flex;gap:20px}
.hs .v{font-size:18px;font-weight:600;color:var(--gold)}
.hs .l{font-size:10px;color:var(--t3);margin-top:2px}
.sec{padding:16px 16px 8px;font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.filter-row{display:flex;gap:6px;padding:12px 16px 6px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fchip{padding:5px 12px;border-radius:20px;font-size:11px;white-space:nowrap;cursor:pointer;border:.5px solid var(--brd);color:var(--t3);background:var(--bg2);transition:all .15s;user-select:none}
.fchip.on{background:var(--gold-dim);border-color:var(--gold-b);color:var(--gold)}
.pcard{margin:0 16px 12px;background:var(--bg2);border-radius:14px;border:.5px solid var(--brd);overflow:hidden;cursor:pointer;transition:border-color .15s}
.pcard:active{border-color:var(--gold-b)}
/* slider */
.slider-wrap{position:relative;height:200px;overflow:hidden;background:#111}
.slides{display:flex;height:100%;transition:transform .3s ease}
.slide{flex:0 0 100%;height:100%;overflow:hidden}
.slide img{width:100%;height:100%;object-fit:cover;display:block}
.slide-placeholder{width:100%;height:100%}
.slide-prev,.slide-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.45);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10}
.slide-prev{left:8px}.slide-next{right:8px}
.slide-prev svg,.slide-next svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.slide-dots{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:5px;pointer-events:none}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);transition:background .2s}
.dot.on{background:#fff}
.photo-count{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:3px 8px;border-radius:10px;pointer-events:none}
.pbadge{position:absolute;top:10px;left:10px;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;z-index:5;pointer-events:none}
.pbadge.hot{background:rgba(201,168,76,.18);color:var(--gold);border:.5px solid var(--gold-b)}
.pbadge.new{background:rgba(91,173,255,.15);color:var(--blue);border:.5px solid rgba(91,173,255,.3)}
.pbadge.pend{background:rgba(255,165,0,.15);color:var(--orange);border:.5px solid rgba(255,165,0,.3)}
.pbadge.pub{background:rgba(78,203,113,.15);color:var(--green);border:.5px solid rgba(78,203,113,.3)}
.pinfo{padding:12px 14px}
.pname{font-size:14px;font-weight:600;color:#fff;margin-bottom:3px}
.ploc{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:4px;margin-bottom:10px}
.ploc svg{width:11px;height:11px;stroke:var(--gold);fill:none;stroke-width:2;flex-shrink:0}
.pmeta{display:flex;justify-content:space-between;align-items:flex-end}
.pyield .pct{font-size:20px;font-weight:600;color:var(--gold);line-height:1}
.pyield .lb,.pprice .lb{font-size:10px;color:var(--t3);margin-top:2px}
.pprice{text-align:right}
.pprice .am{font-size:13px;font-weight:600;color:#fff}
.pbar{margin-top:10px}
.pbar .br{height:3px;background:var(--brd);border-radius:2px;overflow:hidden}
.pbar .fl{height:100%;background:var(--gold);border-radius:2px}
.pbar .bm{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--t3)}
.more-hint{display:flex;align-items:center;justify-content:flex-end;margin-top:8px;font-size:11px;color:var(--gold);gap:3px}
.more-hint svg{width:12px;height:12px;stroke:var(--gold);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
/* profile */
.phead{padding:20px 16px 12px;display:flex;align-items:center;gap:12px}
.avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0}
.av-inv{background:rgba(201,168,76,.12);border:1.5px solid rgba(201,168,76,.35);color:var(--gold)}
.av-re{background:rgba(91,173,255,.12);border:1.5px solid rgba(91,173,255,.3);color:var(--blue)}
.phead-name{font-size:16px;font-weight:600;color:#fff}
.phead-role{font-size:11px;color:var(--gold);margin-top:3px;display:flex;align-items:center;gap:4px}
.sgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:0 16px 12px}
.scard{background:var(--bg2);border:.5px solid var(--brd);border-radius:12px;padding:12px}
.scard .sv{font-size:22px;font-weight:600;color:var(--gold)}
.scard .sl{font-size:10px;color:var(--t3);margin-top:2px}
.mlist{margin:0 16px}
.mi{display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--bg2);border:.5px solid var(--brd);border-radius:10px;margin-bottom:6px;cursor:pointer}
.mi svg{width:18px;height:18px;stroke:var(--t3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.mi span{font-size:13px;color:#ccc;flex:1}
.mi .arr{stroke:var(--brd);width:14px}
.mi.cta svg{stroke:var(--gold)}.mi.cta span{color:var(--gold)}
.quota{margin:12px 16px;background:var(--bg2);border:.5px solid var(--brd);border-radius:10px;padding:12px 14px}
.quota .qt{font-size:11px;color:var(--t2);margin-bottom:8px}
.quota .qb{height:4px;background:var(--brd);border-radius:2px;overflow:hidden;margin-bottom:5px}
.quota .qf{height:100%;background:var(--gold);border-radius:2px}
.quota .qm{display:flex;justify-content:space-between;font-size:10px;color:var(--t3)}
.ocard{margin:0 16px 8px;background:var(--bg2);border:.5px solid var(--brd);border-radius:12px;overflow:hidden}
.ocard-top{display:flex;align-items:center;gap:8px;padding:12px 14px 10px}
.ocard-top .on2{font-size:13px;font-weight:600;color:#fff;flex:1}
.ocard-body{padding:0 14px 12px;font-size:11px;color:var(--t3)}
.ocard-thumb{width:44px;height:34px;border-radius:6px;object-fit:cover;flex-shrink:0}
.ocard-thumb-ph{width:44px;height:34px;border-radius:6px;background:var(--brd);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ocard-thumb-ph svg{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:1.5}
/* form */
.form-wrap{padding:16px}
.form-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:3px}
.form-sub{font-size:11px;color:var(--t3);margin-bottom:16px}
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:var(--t2);margin-bottom:5px}
.field input,.field textarea{width:100%;padding:10px 12px;background:var(--bg2);border:.5px solid var(--brd);border-radius:8px;color:#fff;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;appearance:none}
.field input:focus,.field textarea:focus{border-color:var(--gold-b)}
.field textarea{resize:none;height:70px}
.field-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.photo-upload-zone{border:1.5px dashed var(--brd);border-radius:10px;padding:20px 12px;text-align:center;cursor:pointer;margin-bottom:10px;position:relative}
.photo-upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-upload-zone svg{width:28px;height:28px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto 8px}
.photo-upload-zone p{font-size:12px;color:var(--t3)}
.photo-upload-zone span{font-size:10px;color:var(--t3);display:block;margin-top:3px}
.photo-preview-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:10px}
.preview-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:.5px solid var(--brd)}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-item .del-btn{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);border:none;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
.preview-item .del-btn svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round}
.preview-item .main-badge{position:absolute;bottom:3px;left:3px;font-size:8px;padding:2px 5px;background:var(--gold);color:#000;border-radius:4px;font-weight:600}
.submit-btn{width:100%;padding:13px;background:var(--gold-dim);border:.5px solid var(--gold-b);border-radius:10px;color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px}
/* plans */
.plans-header{padding:18px 16px 10px}
.plans-header h2{font-size:18px;font-weight:600;color:#fff}
.plans-header p{font-size:12px;color:var(--t3);margin-top:4px}
.plan{margin:0 16px 10px;border-radius:14px;border:.5px solid var(--brd);overflow:hidden}
.plan.feat{border-color:var(--gold-b)}
.plan-head{padding:14px 16px 12px;position:relative}
.plan-head.s{background:var(--bg2)}.plan-head.p{background:#1a1610}.plan-head.e{background:#140f20}
.plan-name{font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase}
.plan-price{display:flex;align-items:baseline;gap:4px;margin-top:4px}
.plan-price .pa{font-size:28px;font-weight:700}
.plan-price .pp{font-size:12px;color:var(--t3)}
.plan-badge2{position:absolute;top:14px;right:14px;font-size:10px;padding:3px 9px;border-radius:10px}
.plan-badge2.pop{background:rgba(201,168,76,.18);color:var(--gold);border:.5px solid var(--gold-b)}
.plan-badge2.top{background:rgba(160,100,255,.18);color:var(--purple);border:.5px solid rgba(160,100,255,.35)}
.plan-feats{background:var(--bg3);padding:12px 16px}
.pfeat{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:12px;color:#bbb}
.pfeat:last-child{margin-bottom:0}
.pfeat svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.pfeat.dim{color:var(--t3)}.pfeat.dim svg{stroke:#333}
.plan-btn{margin:10px 16px 14px;padding:11px;border-radius:10px;border:none;width:calc(100% - 32px);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.plan-btn.s{background:var(--bg2);border:.5px solid var(--brd);color:var(--t3)}
.plan-btn.p{background:var(--gold-dim);border:.5px solid var(--gold-b);color:var(--gold)}
.plan-btn.e{background:rgba(160,100,255,.12);border:.5px solid rgba(160,100,255,.35);color:var(--purple)}
/* moderation */
.mod-head{padding:18px 16px 10px}
.mod-head h2{font-size:18px;font-weight:600;color:#fff}
.mod-head p{font-size:12px;color:var(--t3);margin-top:4px}
.mcard{margin:0 16px 10px;background:var(--bg2);border:.5px solid var(--brd);border-radius:12px;overflow:hidden}
.mcard-slider{height:120px;overflow:hidden;background:#111;position:relative}
.mcard-slides{display:flex;height:100%;transition:transform .3s}
.mcard-slide{flex:0 0 100%;height:100%}
.mcard-slide img{width:100%;height:100%;object-fit:cover}
.mcard-slide .ph{width:100%;height:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.mc-nav{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.5);color:#fff;font-size:9px;padding:2px 6px;border-radius:8px;cursor:pointer}
.mcard-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.mcard-top .mt{font-size:13px;font-weight:600;color:#fff}
.ms{font-size:10px;padding:3px 8px;border-radius:8px}
.ms.pend{background:rgba(255,165,0,.15);color:var(--orange)}
.ms.ok{background:rgba(78,203,113,.15);color:var(--green)}
.mcard-body{padding:0 14px 12px}
.mcard-body p{font-size:11px;color:var(--t3);margin-bottom:4px}
.mcard-body .realtor{font-size:11px;color:var(--blue)}
.mbtns{display:flex;gap:8px;margin-top:10px}
.mbtns button{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.mbtns .appr{background:rgba(78,203,113,.12);border:.5px solid rgba(78,203,113,.3);color:var(--green)}
.mbtns .rej{background:rgba(226,75,74,.1);border:.5px solid rgba(226,75,74,.25);color:var(--red)}
/* admin stats */
.astats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:0 16px 12px}
.astat{background:var(--bg2);border:.5px solid var(--brd);border-radius:12px;padding:14px}
.astat .av{font-size:24px;font-weight:700;color:var(--gold)}
.astat .al{font-size:10px;color:var(--t3);margin-top:3px}
.arow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--brd)}
.arow:last-child{border-bottom:none}
.arow .ak{font-size:12px;color:var(--t2)}
.arow .aval{font-size:12px;color:var(--gold);font-weight:600}
.abox{margin:0 16px 10px;background:var(--bg2);border:.5px solid var(--brd);border-radius:12px;padding:14px}
.abox-title{font-size:11px;color:var(--t3);margin-bottom:10px}
.empty{padding:50px 20px;text-align:center}
.empty svg{width:40px;height:40px;stroke:var(--brd);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto 12px}
.empty p{font-size:13px;color:var(--t3)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 16px 0;padding:12px;background:var(--gold-dim);border:.5px solid var(--gold-b);border-radius:10px;cursor:pointer;color:var(--gold);font-size:13px;font-weight:600}
.add-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.safe{height:20px}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e35;border:.5px solid var(--gold-b);color:var(--gold);font-size:12px;padding:10px 18px;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ══ DETAIL BOTTOM SHEET ══ */
#detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background .3s}
#detail-overlay.open{background:rgba(0,0,0,.65);pointer-events:all}
#detail-sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
#detail-sheet::-webkit-scrollbar{display:none}
#detail-sheet.open{transform:translateY(0)}
.ds-handle{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:12px auto 0}
.ds-close-btn{position:absolute;top:12px;right:14px;background:var(--bg2);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10}
.ds-close-btn svg{width:14px;height:14px;stroke:var(--t2);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
#detail-sheet .slider-wrap{height:260px}
.ds-body{padding:16px 16px 32px}
.ds-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.2}
.ds-loc{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:5px;margin-bottom:16px}
.ds-loc svg{width:13px;height:13px;stroke:var(--gold);fill:none;stroke-width:2;flex-shrink:0}
.ds-metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:16px}
.ds-metric{background:var(--bg2);border:.5px solid var(--brd);border-radius:12px;padding:12px 14px}
.ds-metric .mv{font-size:22px;font-weight:700;color:var(--gold);line-height:1}
.ds-metric .ml{font-size:10px;color:var(--t3);margin-top:3px}
.ds-progress{background:var(--bg2);border:.5px solid var(--brd);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.ds-progress .dp-title{font-size:11px;color:var(--t2);margin-bottom:8px}
.ds-progress .dp-bar{height:6px;background:var(--brd);border-radius:3px;overflow:hidden;margin-bottom:6px}
.ds-progress .dp-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .6s ease}
.ds-progress .dp-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--t3)}
.dp-pct{font-size:13px;font-weight:600;color:var(--gold)}
.ds-stitle{font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.ds-desc{font-size:13px;color:#bbb;line-height:1.65;margin-bottom:16px}
.ds-features{margin-bottom:16px}
.ds-feat{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--brd);font-size:12px;color:#ccc}
.ds-feat:last-child{border-bottom:none}
.ds-feat svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ds-realtor{background:var(--bg2);border:.5px solid var(--brd);border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.ds-realtor .rav{width:40px;height:40px;border-radius:50%;background:rgba(91,173,255,.12);border:1px solid rgba(91,173,255,.25);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--blue);flex-shrink:0}
.ds-realtor .rname{font-size:13px;font-weight:600;color:#fff}
.ds-realtor .rbadge{font-size:10px;color:var(--gold);margin-top:2px}
.ds-realtor .rrating{margin-left:auto;text-align:right}
.ds-realtor .rrating .rv{font-size:16px;font-weight:700;color:var(--gold)}
.ds-realtor .rrating .rl{font-size:9px;color:var(--t3)}
.ds-cta{width:100%;padding:14px;background:var(--gold-dim);border:.5px solid var(--gold-b);border-radius:12px;color:var(--gold);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}

async function apiAuth() {
  var initData = tg && tg.initData ? tg.initData : '';
  if (!initData) {
    // Режим разработки — без Telegram
    currentUser = { role: 'investor', first_name: 'Гость', tg_id: 0, subscription: null };
    return currentUser;
  }
  try {
    var res = await fetch(API_URL + '/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: initData })
    });
    if (!res.ok) throw new Error('auth failed');
    currentUser = await res.json();
    return currentUser;
  } catch(e) {
    currentUser = { role: 'investor', first_name: 'Гость', tg_id: 0, subscription: null };
    return currentUser;
  }
}

async function apiGetProperties(city, minYield) {
  try {
    var url = API_URL + '/properties?limit=20';
    if (city && city !== 'Все') url += '&city=' + encodeURIComponent(city);
    if (minYield) url += '&min_yield=' + minYield;
    var res = await fetch(url);
    if (!res.ok) throw new Error('failed');
    var data = await res.json();
    return data.items || [];
  } catch(e) {
    return null; // null = показать демо-данные
  }
}

// ── SLIDER (no nested template literals) ──
function makeSlider(id, photos) {
  var count = photos && photos.length ? photos.length : 0;
  var slidesHtml = '';
  if (count > 0) {
    for (var i = 0; i < count; i++) {
      slidesHtml += '<div class="slide"><img src="' + photos[i] + '" loading="lazy" onerror="this.style.display=\'none\'"></div>';
    }
  } else {
    slidesHtml = '<div class="slide"><div class="slide-placeholder">' + cityArt() + '</div></div>';
    count = 0;
  }
  var navHtml = count > 1
    ? '<button class="slide-prev" onclick="sMove(event,\'' + id + '\',-1)" aria-label="Назад"><svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg></button>'
    + '<button class="slide-next" onclick="sMove(event,\'' + id + '\',1)" aria-label="Вперёд"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></button>'
    : '';
  var dotsHtml = '';
  if (count > 1) {
    dotsHtml = '<div class="slide-dots">';
    for (var j = 0; j < count; j++) {
      dotsHtml += '<div class="dot' + (j === 0 ? ' on' : '') + '" id="dot-' + id + '-' + j + '"></div>';
    }
    dotsHtml += '</div>';
  }
  var countHtml = count > 1 ? '<div class="photo-count">' + count + ' фото</div>' : '';
  return '<div class="slider-wrap" id="sw-' + id + '"><div class="slides" id="sl-' + id + '">' + slidesHtml + '</div>' + navHtml + dotsHtml + countHtml + '</div>';
}

function sMove(e, id, dir) {
  e.stopPropagation();
  var sl = document.getElementById('sl-' + id);
  if (!sl) return;
  var count = sl.children.length;
  var idx = ((slideIdx[id] || 0) + dir + count) % count;
  slideIdx[id] = idx;
  sl.style.transform = 'translateX(-' + (idx * 100) + '%)';
  var wrap = document.getElementById('sw-' + id);
  if (wrap) {
    wrap.querySelectorAll('.dot').forEach(function(d, i) { d.classList.toggle('on', i === idx); });
    var cnt = wrap.querySelector('.photo-count');
    if (cnt) cnt.textContent = (idx + 1) + '/' + count + ' фото';
  }
}

async function loadFeedCards(city, minYield) {
  var container = document.getElementById('feed-cards');
  if (!container) return;

  var items = await apiGetProperties(city, minYield);

  // Если API недоступен — показываем демо
  if (!items) {
    items = Object.values(PROJECTS);
  } else if (items.length === 0) {
    // Пустой ответ от API — тоже показываем демо пока нет реальных данных
    items = Object.values(PROJECTS);
  } else {
    items = items.map(normalizeProperty);
    // Добавляем в PROJECTS для openDetail
    items.forEach(function(p) { PROJECTS[p.id] = p; });
  }

  // Обновляем статистику в hero
  var hsCount = document.getElementById('hs-count');
  var hsYield = document.getElementById('hs-yield');
  if (hsCount) hsCount.textContent = items.length;
  if (hsYield && items.length > 0) {
    var avg = items.reduce(function(s,p){ return s + parseFloat(p.yld||0); }, 0) / items.length;
    hsYield.textContent = avg.toFixed(1) + '%';
  }

  // Рендерим карточки
  var html = '';
  for (var i = 0; i < items.length; i++) {
    html += projectCard(items[i]);
  }
  if (!html) html = '<div style="padding:40px 20px;text-align:center;color:#555;font-size:13px">Объектов пока нет</div>';
  container.innerHTML = html + '<div class="safe"></div>';
}

function fChip(el, city, minYield) {
  document.querySelectorAll('.fchip').forEach(function(c){ c.classList.remove('on'); });
  el.classList.add('on');
  loadFeedCards(city || '', minYield || null);
}

function initUpload() { uploadedPhotos = []; renderPreviews(); }

function handlePhotos(input) {
  var files = Array.from(input.files);
  var rem = 10 - uploadedPhotos.length;
  var toAdd = files.slice(0, rem);
  toAdd.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      uploadedPhotos.push({ dataUrl: e.target.result, name: file.name });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  if (files.length > rem) showToast('Максимум 10 фото. Добавлено ' + toAdd.length);
  input.value = '';
}

function renderPreviews() {
  var grid = document.getElementById('photo-preview-grid');
  var zone = document.getElementById('upload-zone');
  var lbl = document.getElementById('upload-lbl');
  if (!grid) return;
  var html = '';
  for (var i = 0; i < uploadedPhotos.length; i++) {
    html += '<div class="preview-item"><img src="' + uploadedPhotos[i].dataUrl + '">'
      + '<button class="del-btn" onclick="delPhoto(' + i + ')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
      + (i === 0 ? '<span class="main-badge">Главное</span>' : '')
      + '</div>';
  }
  grid.innerHTML = html;
  if (uploadedPhotos.length >= 10) { zone.style.display = 'none'; }
  else {
    zone.style.display = '';
    if (lbl) lbl.textContent = uploadedPhotos.length > 0 ? 'Добавить ещё (' + uploadedPhotos.length + '/10)' : 'Нажмите или перетащите фото';
  }
}

function delPhoto(idx) { uploadedPhotos.splice(idx, 1); renderPreviews(); }

function makeModCard(id, name, realtor, meta, desc, photos) {

  }
  var navHtml = photos && photos.length > 1
    ? '<div class="mc-nav" onclick="mSlide(\'' + id + '\')">' + photos.length + ' фото ›</div>'
    : '';
  return '<div class="mcard" id="mc-' + id + '">'
    + '<div class="mcard-slider"><div class="mcard-slides" id="msl-' + id + '">' + slidesHtml + '</div>' + navHtml + '</div>'

    + '</div></div>';
}

function mSlide(id) {
  var sl = document.getElementById('msl-' + id);
  if (!sl) return;
  var count = sl.children.length;
  var idx = ((mSlideIdx[id] || 0) + 1) % count;
  mSlideIdx[id] = idx;
  sl.style.transform = 'translateX(-' + (idx * 100) + '%)';
  var nav = sl.parentNode.querySelector('.mc-nav');
  if (nav) nav.textContent = (idx + 1) + '/' + count + ' фото ›';
}

  };
  return icons[name] || '';
}

// ── INIT: авторизация → рендер ──
async function init() {
  // Показываем экран загрузки
  document.getElementById('body').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px"><div style="width:36px;height:36px;border:3px solid #2a2a45;border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite"></div><div style="font-size:14px;color:#555">Авторизация...</div></div>';
  document.getElementById('tabbar').innerHTML = '';

  var user = await apiAuth();

  // Определяем режим по роли
  if (user.role === 'admin') {
    mode = 'admin';
  } else if (user.role === 'realtor') {
    mode = 'realtor';
    // Обновляем label тарифа в шапке
    if (user.subscription) {
      MODES.realtor.label = 'Риелтор · ' + user.subscription.label;
    } else {
      MODES.realtor.label = 'Риелтор · нет подписки';
    }
  } else {
    mode = 'investor';
  }

  // Скрываем переключатель режимов (в проде не нужен)
  var modebar = document.querySelector('.modebar');
  if (modebar && tg && tg.initData) {
    modebar.style.display = 'none';
  }

  // Обновляем пилюлю с именем
  var pill = document.getElementById('mpill');
  if (pill) pill.textContent = user.first_name || MODES[mode].label;

  tab = MODES[mode].tabs[0].id;
  renderAll();
  fixSticky();
}

function fixSticky() {
  var topbar = document.getElementById('topbar');
  var modebar = document.querySelector('.modebar');
  var tabbar = document.getElementById('tabbar');
  if (!topbar || !tabbar) return;
  var h1 = topbar.getBoundingClientRect().height;
  var h2 = (modebar && modebar.style.display !== 'none') ? modebar.getBoundingClientRect().height : 0;
  if (modebar) modebar.style.top = Math.round(h1) + 'px';
  tabbar.style.top = Math.round(h1 + h2) + 'px';
}

window.addEventListener('resize', fixSticky);

init();
</script>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
